<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineFlow - Erro Interno</title>
    <link rel="stylesheet" href="../static/style.css">
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 80vh;
            text-align: center;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: #ff4b4b; /* Vermelho para erro crítico */
            line-height: 1;
            margin-bottom: 10px;
        }

        .error-message {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .error-sub {
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .error-illustration {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .btn-back {
            background: var(--accent);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius);
            text-decoration: none;
            font-weight: bold;
            transition: var(--transition);
            border: none;
            cursor: pointer;
        }

        .btn-back:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <header class="container">
        <a href="/" style="text-decoration: none; color: inherit;"><h1>CineFlow</h1></a>
    </header>

    <main class="container">
        <div class="error-container">
            <div class="error-illustration">⚙️⚠️</div>
            <h1 class="error-code">500</h1>
            <p class="error-message">Algo deu errado nos nossos projetores.</p>
            <p class="error-sub">Estamos a ter um problema técnico. Por favor, tente recarregar a página ou volte mais tarde.</p>
            <button onclick="window.location.reload()" class="btn-back" style="margin-bottom: 10px;">Tentar Novamente</button>
            <br>
            <a href="/" style="color: var(--accent); text-decoration: none; font-size: 0.9rem;">Voltar para a Home</a>
        </div>
    </main>

    <script>
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'light') {
            document.body.classList.add('light-theme');
        }
    </script>
</body>
</html>
