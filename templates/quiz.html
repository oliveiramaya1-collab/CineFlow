<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineFlow - Quiz Personalizado</title>
    <link rel="stylesheet" href="../static/style.css">
    <style>
        :root {
            --accent-glow: rgba(47, 129, 247, 0.4);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        .quiz-container { max-width: 1100px; margin: 0 auto; text-align: center; padding: 20px; }
        
        /* --- ESTILOS DO QUIZ --- */
        .question-card { background: var(--card-bg); padding: 40px; border-radius: var(--radius); border: 1px solid var(--border-color); }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .btn-quiz { 
            padding: 20px; border-radius: var(--radius); border: 1px solid var(--border-color);
            background: var(--card-bg); color: var(--primary); cursor: pointer; transition: all 0.3s ease;
            font-weight: 600;
        }
        .btn-quiz:hover { border-color: var(--accent); background: rgba(47, 129, 247, 0.1); transform: translateY(-2px); }

        /* --- RESULTADOS REESTILIZADOS --- */
        .results-group { margin-bottom: 60px; text-align: left; opacity: 0; animation: fadeInUp 0.8s forwards; }

        /* Container de Elite (Top 5) */
        .top-recommendations-box {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        /* Brilho de fundo no topo */
        .top-recommendations-box::after {
            content: ''; position: absolute; top: -50px; left: -50px; width: 200px; height: 200px;
            background: var(--accent); filter: blur(120px); opacity: 0.15; z-index: 0;
        }

        .group-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 30px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            z-index: 1;
        }

        .group-title span { color: var(--accent); }

        .grid-5-columns {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            position: relative;
            z-index: 1;
        }

        /* CARD DE FILME ESTILIZADO */
        .movie-card-quiz {
            background: #161b22;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            display: block;
        }

        /* Efeito de Destaque no Top 5 */
        .top-match-card {
            border: 1px solid rgba(47, 129, 247, 0.5);
            box-shadow: 0 0 0 rgba(47, 129, 247, 0);
        }

        .top-match-card:hover {
            transform: translateY(-12px) scale(1.03);
            border-color: var(--accent);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5), 0 0 20px var(--accent-glow);
        }

        .poster-wrapper { position: relative; width: 100%; aspect-ratio: 2/3; }
        
        .movie-card-quiz img { width: 100%; height: 100%; object-fit: cover; }

        /* Badge de Match % */
        .match-badge {
            position: absolute; top: 10px; right: 10px;
            background: var(--accent); color: white;
            padding: 4px 8px; border-radius: 6px;
            font-size: 0.7rem; font-weight: 900;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .info { padding: 15px; background: #161b22; }
        .info h3 { 
            font-size: 0.9rem; margin: 0 0 5px 0; color: #f0f6fc;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .info span { font-size: 0.75rem; color: #8b949e; font-weight: 500; }

        .btn-nav {
            background-color: transparent; 
            border: 1px solid var(--border-color); 
            color: var(--primary);
        }

        /* Animações */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 950px) {
            .grid-5-columns { grid-template-columns: repeat(3, 1fr); }
            .top-recommendations-box { padding: 20px; }
        }

        @media (max-width: 600px) {
            .grid-5-columns { grid-template-columns: repeat(2, 1fr); }
            .group-title { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <header class="container">
        
        <div class="header-top">
            <a href="/" style="text-decoration: none; color: inherit;">
            <h1>CineFlow <span style="color:var(--accent)">QUIZ</span></h1>
            </a>
            <div style="display: flex; gap: 15px; align-items: center;">
                <button id="theme-toggle" class="btn-nav" style="cursor: pointer;">
                <span id="theme-icon">🌙</span>
                </button>
                <a href="/" class="btn-nav">↩ Sair</a>
            </div>
        </div>

    </header>

    <main class="container quiz-container">
        <section id="intro" class="question-card">
            <div style="font-size: 3rem; margin-bottom: 20px;">🔮</div>
            <h2>Análise de Perfil</h2>
            <p style="color: var(--text-muted); margin: 15px 0;">Responda às 20 questões para que o nosso sistema identifique o seu padrão de entretenimento.</p>
            <button class="btn-favorito" onclick="startQuiz()" style="width: 100%; padding: 20px;">Começar Perfilamento</button>
        </section>

        <section id="quiz-ui" style="display: none;">
            <div class="progress-bar"><div id="progress" class="progress-inner"></div></div>
            <div class="question-card">
                <p id="counter" style="font-size: 0.8rem; color: var(--accent); font-weight: bold; letter-spacing: 1px;"></p>
                <h2 id="question-text" style="margin: 20px 0; font-size: 1.5rem;"></h2>
                <div id="options" class="options-grid"></div>
            </div>
        </section>

        <section id="results" style="display: none;">
            
            <div class="results-group top-recommendations-box">
                <div class="group-title"><span>✦</span> Melhores Combinações</div>
                <div id="grid-top" class="grid-5-columns"></div>
            </div>

            <div class="results-group" style="animation-delay: 0.3s;">
                <div class="group-title" style="font-size: 1.3rem; opacity: 0.7;">Outras Recomendações</div>
                <div id="grid-secondary" class="grid-5-columns"></div>
            </div>
            
            <button class="btn-nav" onclick="location.reload()" style="margin-bottom: 50px;">Refazer Diagnóstico</button>
        </section>
    </main>

    <script>
        const questions = [
            { q: "Qual é a sua vibe principal hoje?", opts: [{t:"Adrenalina e Explosão", g:"28"}, {t:"Rir até chorar", g:"35"}, {t:"Reflexão Profunda", g:"18"}, {t:"Tensão e Mistério", g:"53"}] },
            { q: "Se você pudesse viajar no tempo, para onde iria?", opts: [{t:"Para o futuro tecnológico", g:"878"}, {t:"Para a era dos castelos e magia", g:"14"}, {t:"Para um evento histórico real", g:"36"}, {t:"Para o velho oeste", g:"37"}] },
            { q: "O que não pode faltar em um bom filme?", opts: [{t:"Cenas de luta épicas", g:"28"}, {t:"Um romance inesquecível", g:"10749"}, {t:"Sustos de pular da cadeira", g:"27"}, {t:"Um crime para resolver", g:"80"}] },
            { q: "Qual dessas artes mais te encanta?", opts: [{t:"Desenhos e Animações", g:"16"}, {t:"Grandes Musicais", g:"10402"}, {t:"Documentários reais", g:"99"}, {t:"Histórias de guerra", g:"10752"}] },
            { q: "Como prefere o ritmo da história?", opts: [{t:"Frenético", g:"28"}, {t:"Lento e focado", g:"18"}, {t:"Leve e familiar", g:"10751"}, {t:"Cheio de reviravoltas", g:"9648"}] },
            { q: "Escolha um cenário para aventura:", opts: [{t:"Floresta encantada", g:"12"}, {t:"Delegacia de polícia", g:"80"}, {t:"Nave espacial", g:"878"}, {t:"Casa mal-assombrada", g:"27"}] },
            { q: "Quem seria você no filme?", opts: [{t:"O herói", g:"28"}, {t:"O engraçado", g:"35"}, {t:"O estrategista", g:"9648"}, {t:"O romântico", g:"10749"}] },
            { q: "Maior interesse pessoal:", opts: [{t:"Inteligência Artificial", g:"878"}, {t:"Drama humano", g:"18"}, {t:"Mente criminosa", g:"80"}, {t:"Mitologia", g:"14"}] },
            { q: "Com quem vai assistir?", opts: [{t:"Família", g:"10751"}, {t:"Encontro romântico", g:"10749"}, {t:"Amigos", g:"35"}, {t:"Sozinho", g:"27"}] },
            { q: "O que te faz desligar a TV?", opts: [{t:"Tédio/Lentidão", g:"28"}, {t:"Infantilidade", g:"18"}, {t:"Furos no roteiro", g:"9648"}, {t:"Medo excessivo", g:"35"}] },
            { q: "Elemento visual favorito:", opts: [{t:"Cores vibrantes", g:"16"}, {t:"Sombras e mistério", g:"53"}, {t:"Explosões", g:"28"}, {t:"Natureza", g:"12"}] },
            { q: "Tema fascinante:", opts: [{t:"Conspirações", g:"9648"}, {t:"Superação", g:"18"}, {t:"Alienígenas", g:"878"}, {t:"Vingança", g:"80"}] },
            { q: "Final ideal?", opts: [{t:"Feliz", g:"10751"}, {t:"Realista/Triste", g:"18"}, {t:"Gancho/Aberto", g:"28"}, {t:"Inesperado", g:"9648"}] },
            { q: "Nostalgia preferida:", opts: [{t:"Anos 80/90", g:"35"}, {t:"Medieval", g:"14"}, {t:"Cyberpunk", g:"878"}, {t:"Guerras Mundiais", g:"10752"}] },
            { q: "Traço do protagonista:", opts: [{t:"Super-poderes", g:"14"}, {t:"Força física", g:"28"}, {t:"QI elevado", g:"9648"}, {t:"Bom coração", g:"35"}] },
            { q: "Sentimento pós-filme?", opts: [{t:"Motivado", g:"18"}, {t:"Leve", g:"35"}, {t:"Eufórico", g:"28"}, {t:"Impactado", g:"53"}] },
            { q: "Sua vida seria:", opts: [{t:"Comédia Romântica", g:"10749"}, {t:"Drama cult", g:"18"}, {t:"Aventura", g:"12"}, {t:"Suspense", g:"53"}] },
            { q: "Maior medo?", opts: [{t:"Fantasmas", g:"27"}, {t:"Assaltos", g:"80"}, {t:"Desastres", g:"53"}, {t:"Solidão", g:"18"}] },
            { q: "Trilha sonora ideal?", opts: [{t:"Clássica", g:"18"}, {t:"Pop/Rock", g:"10402"}, {t:"Eletrônica", g:"878"}, {t:"Ambiental", g:"53"}] },
            { q: "Objetivo de hoje?", opts: [{t:"Diversão", g:"28"}, {t:"Cultura", g:"99"}, {t:"Emoção", g:"10749"}, {t:"Fugir do mundo", g:"14"}] }
        ];

        let current = 0;
        let votes = {};

        function startQuiz() {
            document.getElementById('intro').style.display = 'none';
            document.getElementById('quiz-ui').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            const q = questions[current];
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('counter').innerText = `STEP ${current + 1} / 20`;
            document.getElementById('progress').style.width = ((current + 1) / 20 * 100) + "%";
            
            const container = document.getElementById('options');
            container.innerHTML = '';
            q.opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'btn-quiz';
                b.innerText = o.t;
                b.onclick = () => {
                    votes[o.g] = (votes[o.g] || 0) + 1;
                    current++;
                    if(current < 20) showQuestion(); else finish();
                };
                container.appendChild(b);
            });
        }

        function finish() {
            document.getElementById('quiz-ui').style.display = 'none';
            document.getElementById('results').style.display = 'block';
            const winner = Object.keys(votes).reduce((a, b) => votes[a] > votes[b] ? a : b);
            
            fetch(`/api/quiz/recomendacao?genero=${winner}`)
                .then(res => res.json())
                .then(data => {
                    const gridTop = document.getElementById('grid-top');
                    const gridSecondary = document.getElementById('grid-secondary');
                    
                    const top5 = data.filmes.slice(0, 5);
                    const rest5 = data.filmes.slice(5, 10);

                    const createCard = (f, isTop) => `
                        <a href="/movie/${f.id}" class="movie-card-quiz ${isTop ? 'top-match-card' : ''}">
                            <div class="poster-wrapper">
                                ${isTop ? '<div class="match-badge">99% MATCH</div>' : ''}
                                <img src="https://image.tmdb.org/t/p/w500${f.poster_path}" alt="${f.title}">
                            </div>
                            <div class="info">
                                <h3>${f.title}</h3>
                                <span>${f.ano}</span>
                            </div>
                        </a>
                    `;

                    gridTop.innerHTML = top5.map(f => createCard(f, true)).join('');
                    gridSecondary.innerHTML = rest5.map(f => createCard(f, false)).join('');
                });
        }

        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');

        // Função para aplicar o tema
        function applyTheme(theme) {
            if (theme === 'light') {
                document.body.classList.add('light-theme');
                themeIcon.innerText = '☀️';
            } else {
                document.body.classList.remove('light-theme');
                themeIcon.innerText = '🌙';
            }
        }

        // Verifica se já existe uma preferência salva
        const savedTheme = localStorage.getItem('theme') || 'dark';
        applyTheme(savedTheme);

        // Evento de clique no botão
        themeToggle.addEventListener('click', () => {
            const isLight = document.body.classList.contains('light-theme');
            const newTheme = isLight ? 'dark' : 'light';
            
            localStorage.setItem('theme', newTheme);
            applyTheme(newTheme);
        });

    </script>
</body>
</html>
